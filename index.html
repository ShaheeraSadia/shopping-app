<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop & Earn - Shaheera Sadia</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --primary: #2c5aa0;
            --premium: #f39c12; /* گولڈن رنگ پریمیم کے لیے */
            --bg: #f4f7f6;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        /* Ad Space Styling */
        .ad-placeholder {
            background: #e2e8f0;
            border: 2px dashed #cbd5e0;
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            color: #718096;
            font-size: 0.8rem;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
            position: relative;
        }

        .premium-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--premium);
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .product-img { width: 100%; height: 200px; object-fit: cover; }
        .product-info { padding: 15px; }

        .btn-buy {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Sidebar for Monetization Info */
        .monetization-bar {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-top: 30px;
            border-left: 5px solid var(--premium);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [isPremium, setIsPremium] = useState(false);

            const products = [
                { id: 1, name: "Smart Watch", price: 199, type: "free", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" },
                { id: 2, name: "Premium Lens", price: 599, type: "premium", img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=400" },
                { id: 3, name: "Wireless Buds", price: 89, type: "free", img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" }
            ];

            return (
                <div className="container">
                    {/* 1. AdMob Banner Placeholder (Earning Method 1) */}
                    {!isPremium && (
                        <div className="ad-placeholder">
                            Google AdMob Banner Display Area (Earning Revenue...)
                        </div>
                    )}

                    <header style={{display: 'flex', justifyContent: 'space-between', marginBottom: '30px'}}>
                        <h1>Shaheera's Store</h1>
                        <button 
                            onClick={() => setIsPremium(!isPremium)}
                            style={{background: var(--premium), border: 'none', padding: '10px', borderRadius: '8px', color: 'white', fontWeight: 'bold', cursor: 'pointer'}}
                        >
                            {isPremium ? "Premium Active" : "Go Premium ($5)"}
                        </button>
                    </header>

                    {/* 2. Products Section (Earning Method 2: Sales/Affiliate) */}
                    <div className="products-grid">
                        {products.map(p => (
                            <div key={p.id} className="product-card">
                                {p.type === 'premium' && <span className="premium-tag">PREMIUM</span>}
                                <img src={p.img} className="product-img" alt={p.name} />
                                <div className="product-info">
                                    <h3>{p.name}</h3>
                                    <p style={{color: 'var(--primary)', fontWeight: 'bold'}}>${p.price}</p>
                                    <button className="btn-buy" onClick={() => alert('Redirecting to Affiliate/Payment Link...')}>
                                        {p.type === 'premium' && !isPremium ? "Unlock with Premium" : "Buy Now"}
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 3. Monetization Insights for You */}
                    <div className="monetization-bar">
                        <h4>💡 Monetization Strategy for Shaheera:</h4>
                        <ul style={{fontSize: '0.9rem', color: '#4a5568', marginTop: '10px'}}>
                            <li><b>Ads:</b> Banner ads are hidden for Premium users (Upsell strategy).</li>
                            <li><b>Affiliate:</b> "Buy Now" can be a Pinterest/Amazon affiliate link.</li>
                            <li><b>Subscriptions:</b> "Go Premium" button simulates a one-time or monthly payment.</li>
                        </ul>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
