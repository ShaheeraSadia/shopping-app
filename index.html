 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaheera Sadia | Professional Store</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --primary: #2c5aa0;
            --secondary: #27ae60;
            --dark: #1a2a40;
            --light: #f8f9fa;
            --white: #ffffff;
            --shadow-sm: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header Styles */
        .header {
            background: var(--white);
            padding: 1.2rem 0;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            background: transparent;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            color: var(--dark);
        }

        .nav-btn.active {
            background: var(--primary);
            color: var(--white);
        }

        .nav-btn:hover:not(.active) {
            background: #edf2f7;
        }

        /* Profile Card Styles */
        .profile-section {
            padding: 40px 0;
            animation: fadeIn 0.5s ease-in;
        }

        .profile-card {
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), #64b5f6);
            color: white;
            font-size: 2.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 5px 15px rgba(44, 90, 160, 0.3);
        }

        .profile-info h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .profile-email {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .profile-email:hover {
            color: var(--secondary);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: #fcfcfc;
            border: 1px solid #f1f1f1;
            padding: 25px;
            border-radius: 20px;
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .stat-value {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #718096;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Order List */
        .orders-container {
            text-align: left;
            margin-top: 40px;
        }

        .order-card {
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-delivered { background: #e6fffa; color: #2c7a7b; }
        .status-pending { background: #fffaf0; color: #975a16; }

        /* Footer */
        .footer {
            margin-top: auto;
            background: var(--dark);
            color: #cbd5e0;
            padding: 30px 0;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .header-content { flex-direction: column; gap: 15px; }
            .stats-grid { grid-template-columns: 1fr; }
            .order-card { flex-direction: column; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [currentPage, setPage] = useState('profile');

            const userData = {
                name: "Shaheera Sadia",
                email: "shaheera.sadia@example.com", // آپ یہاں اپنی اصلی ای میل لکھ سکتی ہیں
                initials: "SS"
            };

            const orderHistory = [
                { id: "ORD-001", date: "April 12, 2026", total: 150.00, status: "Delivered" },
                { id: "ORD-002", date: "April 14, 2026", total: 85.50, status: "Pending" },
                { id: "ORD-003", date: "April 15, 2026", total: 210.00, status: "Delivered" }
            ];

            const totalSpent = orderHistory.reduce((sum, order) => sum + order.total, 0);

            return (
                <div style={{display: 'flex', flexDirection: 'column', minHeight: '100vh'}}>
                    {/* Navigation Header */}
                    <header className="header">
                        <div className="container header-content">
                            <a href="#" className="logo" onClick={() => setPage('profile')}>
                                <span>🛒</span> ShopEasy
                            </a>
                            <nav className="nav-buttons">
                                <button 
                                    className={`nav-btn ${currentPage === 'products' ? 'active' : ''}`}
                                    onClick={() => setPage('products')}
                                >
                                    Store
                                </button>
                                <button 
                                    className={`nav-btn ${currentPage === 'profile' ? 'active' : ''}`}
                                    onClick={() => setPage('profile')}
                                >
                                    Profile
                                </button>
                            </nav>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main style={{flex: 1}}>
                        <div className="container">
                            {currentPage === 'profile' ? (
                                <section className="profile-section">
                                    <div className="profile-card">
                                        <div className="profile-avatar">{userData.initials}</div>
                                        <div className="profile-info">
                                            <h1>{userData.name}</h1>
                                            <a href={`mailto:${userData.email}`} className="profile-email">
                                                {userData.email}
                                            </a>
                                        </div>

                                        <div className="stats-grid">
                                            <div className="stat-card">
                                                <span className="stat-value">{orderHistory.length}</span>
                                                <span className="stat-label">Total Orders</span>
                                            </div>
                                            <div className="stat-card">
                                                <span className="stat-value">${totalSpent.toFixed(2)}</span>
                                                <span className="stat-label">Total Spent</span>
                                            </div>
                                        </div>

                                        <div className="orders-container">
                                            <h2 style={{marginBottom: '20px'}}>Order History</h2>
                                            {orderHistory.map(order => (
                                                <div key={order.id} className="order-card">
                                                    <div>
                                                        <h4 style={{fontSize: '1.1rem'}}>{order.id}</h4>
                                                        <p style={{color: '#718096', fontSize: '0.9rem'}}>{order.date}</p>
                                                    </div>
                                                    <div style={{textAlign: 'right'}}>
                                                        <div style={{fontWeight: '800', fontSize: '1.2rem', color: 'var(--primary)'}}>${order.total}</div>
                                                        <span className={`status-badge ${order.status === 'Delivered' ? 'status-delivered' : 'status-pending'}`}>
                                                            {order.status}
                                                        </span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </section>
                            ) : (
                                <section style={{textAlign: 'center', padding: '100px 20px'}}>
                                    <h1 style={{fontSize: '3rem', color: '#cbd5e0'}}>Coming Soon</h1>
                                    <p>We are currently updating our store inventory.</p>
                                    <button 
                                        className="nav-btn active" 
                                        style={{marginTop: '20px'}}
                                        onClick={() => setPage('profile')}
                                    >
                                        Back to Profile
                                    </button>
                                </section>
                            )}
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="footer">
                        <div className="container">
                            <p style={{fontWeight: '600', color: 'white'}}>Shaheera Sadia</p>
                            <p style={{fontSize: '0.8rem', marginTop: '5px'}}>© 2026 All Rights Reserved | Built with React</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
